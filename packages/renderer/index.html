<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morning Cockpit</title>
    <script>
      // Apply persisted theme/density/accent before first paint (avoids a light/dark flash).
      // Mirrors cockpitState.ts (key mc.cockpit.v1).
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('mc.cockpit.v1') || '{}');
          var r = document.documentElement;
          if (s.theme === 'light' || s.theme === 'dark') r.setAttribute('data-theme', s.theme);
          if (s.density === 'compact' || s.density === 'comfortable') r.setAttribute('data-density', s.density);
          if (s.accent === 'red' || s.accent === 'blue' || s.accent === 'green') r.setAttribute('data-accent', s.accent);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
